# ─────────────────────────────────────────────────────────────────────────────
#  Volúmenes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
  pg_data:
  csv_data:      # Compartido: chunkattack escribe, simulador lee

# ─────────────────────────────────────────────────────────────────────────────
#  Red
# ─────────────────────────────────────────────────────────────────────────────
networks:
  cdc_network:
    driver: bridge

# ─────────────────────────────────────────────────────────────────────────────
#  Servicios
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ──────────────────────────────────────────────────────────────────────────
  #  chunkattack — genera el CSV de 2M usuarios y termina (exit 0)
  # ──────────────────────────────────────────────────────────────────────────
  chunkattack:
    build:
      context: ./chunkattack
      dockerfile: Dockerfile
    container_name: chunkattack
    restart: "no"
    volumes:
      - csv_data:/data
    networks:
      - cdc_network

  # ──────────────────────────────────────────────────────────────────────────
  #  MongoDB — Replica Set rs0, keyfile autogenerado si no existe
  # ──────────────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:latest
    container_name: mongodb_container
    restart: always
    ports:
      - "46100:27017"
    env_file:
      - .env
    entrypoint: ["/bin/sh", "/scripts/mongo-entrypoint.sh"]
    command:
      - "--replSet"
      - "rs0"
      - "--bind_ip_all"
      - "--port"
      - "27017"
      - "--keyFile"
      - "/data/mongodb.key"
      - "--auth"
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-entrypoint.sh:/scripts/mongo-entrypoint.sh:ro
      - ./security/mongodb.key:/etc/mongodb.key:ro
    networks:
      - cdc_network
    healthcheck:
      # Se autentica con las credenciales del .env para verificar que
      # MongoDB está listo Y el Replica Set responde correctamente
      test:
        - "CMD"
        - "mongosh"
        - "--quiet"
        - "-u"
        - "admin" # usuario
        - "-p"
        - "testing" # contraseña
        - "--authenticationDatabase"
        - "admin"
        - "--eval"
        - "db.adminCommand('ping').ok"
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 1G

  # ──────────────────────────────────────────────────────────────────────────
  #  PostgreSQL — Data Warehouse (futuro CDC)
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres_dw
    restart: always
    environment:
      POSTGRES_USER:     admin # usuario
      POSTGRES_PASSWORD: testing # contraseña
      POSTGRES_DB:       datawarehouse
    ports:
      - "46101:5432"
    networks:
      - cdc_network
    volumes:
      - pg_data:/var/lib/postgresql/data

  # ──────────────────────────────────────────────────────────────────────────
  #  Simulador de carga — Rust
  #  Espera: chunkattack exit 0  +  mongodb healthcheck OK
  # ──────────────────────────────────────────────────────────────────────────
  simulador:
    build:
      context: ./simulador
      dockerfile: Dockerfile
    container_name: simulador_carga
    restart: "no"
    depends_on:
      chunkattack:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URI: "mongodb://admin:testing@mongodb:27017/?authSource=admin&directConnection=true"
      CSV_PATH:  "/csv_data/usuarios_sinteticos.csv"
    volumes:
      - csv_data:/csv_data:ro
    networks:
      - cdc_network
    tty:        true
    stdin_open: true
  # ──────────────────────────────────────────────────────────────────────────
  #  Kafka — zookeeper para la coordinación, broker para la mensajería, kafka-connect para el CDC 
  # ──────────────────────────────────────────────────────────────────────────
  # ──────────────────────────────────────────────────────────────────────────
  #  Zookeeper & Kafka (The new CDC Message Broker)
  # ──────────────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: always
    ports:
      - "46110:2181" # Puerto host 46110
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - cdc_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka_broker
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "46111:46111" # Puerto host 46111
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      # PLAINTEXT is for internal docker network, PLAINTEXT_HOST is for your local machine
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:46111
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:46111
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - cdc_network

  # ──────────────────────────────────────────────────────────────────────────
  #  Kafka Connect (El worker que ejecuta los conectores de Mongo/Postgres)
  # ──────────────────────────────────────────────────────────────────────────
  kafka-connect:
    build:
      context: ./kafka-connect
      dockerfile: Dockerfile
    container_name: kafka_connect
    restart: always
    depends_on:
      - kafka
      - mongodb
    ports:
      - "46112:8083" # Puerto host 46112 (Para la API REST)
    environment:
      CONNECT_BOOTSTRAP_SERVERS: 'kafka:29092'
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: compose-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: docker-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: docker-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: docker-connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
    networks:
      - cdc_network

  # ──────────────────────────────────────────────────────────────────────────
  #  CDC Setup — Automates the connector registration
  # ──────────────────────────────────────────────────────────────────────────
  cdc-setup:
    image: curlimages/curl:latest
    container_name: cdc_setup
    restart: "no" # Solo corre una vez y muere
    depends_on:
      - kafka-connect
    volumes:
      - ./setup-cdc.sh:/scripts/setup-cdc.sh:ro
      - ./mongo-source.json:/scripts/mongo-source.json:ro
    entrypoint: ["/bin/sh", "/scripts/setup-cdc.sh"] # El script espera a que kafka-connect esté listo y luego registra el conector de MongoDB usando la configuración en mongo-source.json
    networks:
      - cdc_network